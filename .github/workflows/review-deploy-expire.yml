name: Review Deploy – Expire (Reusable)

on:
  workflow_call:

jobs:
  expire-review-deploy:
    name: Expire review deployment (reusable)
    runs-on: ubuntu-latest

    # Run only when PR is closed (merged or not)
    if: github.event.pull_request.state == 'closed'

    steps:
      - name: Expire deployment
        env:
          API_TOKEN: ${{ secrets.REVIEW_DEPLOY_API_TOKEN }}
        run: |
          set -euo pipefail

          url="https://review.docupilot-dev.in/api/deployments/${{ github.event.repository.name }}-pr${{ github.event.pull_request.number }}/expire/"

          echo "Expiring review deployment via: ${url}"

          response_file="$(mktemp)"
          http_code="$(curl --silent --show-error --write-out "%{http_code}" \
            -X POST "${url}" \
            -H "Authorization: Bearer ${API_TOKEN}" \
            --output "${response_file}")"

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "Failed to expire review deployment. HTTP status: ${http_code}" >&2
            echo "Response body:" >&2
            cat "${response_file}" >&2 || true
            exit 1
          fi

          echo "Successfully requested expiration of review deployment. HTTP status: ${http_code}"
          echo "Response body:"
          cat "${response_file}" || true
