name: Review Deploy (Reusable)

on:
  workflow_call:
    inputs:
      deployment_template_code:
        description: Deployment template code
        required: false
        type: string
        default: docupilot

jobs:
  review-deploy:
    name: Publish image & create review deployment
    runs-on: ubuntu-latest

    if: >
      github.event.action == 'labeled' &&
      github.event.label.name == 'review-deploy' &&
      github.event.pull_request.draft == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Compute image tag
        id: image-tag
        run: |
          echo "IMAGE_TAG=${{ github.event.repository.name }}-${{ github.event.pull_request.number }}-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_DEV }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_DEV }}
          aws-region: ap-south-2

      - name: Publish image to ECR
        run: |
          set -euo pipefail

          REGION="ap-south-2"
          DOCKER_REPO="603414745100.dkr.ecr.$REGION.amazonaws.com"
          PROJECT_NAME="${{ github.event.repository.name }}"
          IMAGE_TAG="${{ steps.image-tag.outputs.IMAGE_TAG }}"
          IMAGE_URI="$DOCKER_REPO/$PROJECT_NAME:$IMAGE_TAG"

          echo "Publishing image: $IMAGE_URI"

          aws ecr get-login-password --region "$REGION" \
            | docker login --username AWS --password-stdin "$DOCKER_REPO"

          docker buildx inspect multiarch-builder >/dev/null 2>&1 \
            || docker buildx create --name multiarch-builder --use

          docker buildx build \
            --platform linux/arm64 \
            -t "$IMAGE_URI" \
            --push \
            .

      - name: Build deployment payload
        run: |
          set -euo pipefail

          PRIMARY="${{ github.event.repository.name }}"
          IMAGE_TAG="${{ steps.image-tag.outputs.IMAGE_TAG }}"

          jq -n \
            --arg version "${GITHUB_SHA::7}" \
            --arg template "${{ inputs.deployment_template_code }}" \
            --arg primary "$PRIMARY" \
            --arg image_tag "$IMAGE_TAG" \
            '{
              version: $version,
              deployment_template_code: $template,
              configs: [
                {
                  key: "accounts",
                  docker_image_tag: (if $primary == "accounts" then $image_tag else "latest" end),
                  environment: {}
                },
                {
                  key: "appserver",
                  docker_image_tag: (if $primary == "appserver" then $image_tag else "latest" end),
                  environment: {}
                }
              ]
            }' > payload.json

          echo "Generated deployment payload:"
          cat payload.json

      - name: Create review deployment
        env:
          API_TOKEN: ${{ secrets.REVIEW_DEPLOY_API_TOKEN }}
        run: |
          set -euo pipefail

          url="https://review.docupilot-dev.in/api/deployments/${{ github.event.repository.name }}-pr${{ github.event.pull_request.number }}/versions/"

          echo "Creating review deployment via: $url"

          response_file="$(mktemp)"
          http_code="$(curl --silent --show-error --write-out "%{http_code}" \
            -X POST "$url" \
            -H "Authorization: Bearer ${API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data @payload.json \
            --output "$response_file")"

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Failed to create review deployment. HTTP status: $http_code" >&2
            echo "Response body:" >&2
            cat "$response_file" >&2 || true
            exit 1
          fi

          echo "Successfully created review deployment (HTTP $http_code)"
          cat "$response_file" || true

      - name: Comment deployment URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Review deployment created: https://review.docupilot-dev.in/#/deployments/pr${context.issue.number}`
            })
